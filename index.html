        initGraph() {
            const canvas = document.getElementById('graph-canvas');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            const container = canvas.parentElement;
            this.graphDragging = false;
            this.graphDragNode = null;
            this.graphDragStartX = 0;
            this.graphDragStartY = 0;
            
            const updateCanvas = () => {
                canvas.width = container.clientWidth;
                canvas.height = container.clientHeight;
                this.drawGraph(ctx, canvas.width, canvas.height);
            };
            
            window.addEventListener('resize', updateCanvas);
            setTimeout(updateCanvas, 100);
            
            const getPointerPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return {
                    x: clientX - rect.left,
                    y: clientY - rect.top
                };
            };
            
            const findNodeAtPos = (x, y) => {
                if (!this.graphNodes) return null;
                for (const node of this.graphNodes) {
                    const dx = x - node.x;
                    const dy = y - node.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 25) return node;
                }
                return null;
            };
            
            const handleStart = (e) => {
                e.preventDefault();
                const pos = getPointerPos(e);
                const node = findNodeAtPos(pos.x, pos.y);
                if (node) {
                    this.graphDragging = true;
                    this.graphDragNode = node;
                    this.graphDragStartX = pos.x - node.x;
                    this.graphDragStartY = pos.y - node.y;
                    this.graphDidMove = false;
                }
            };
            
            const handleMove = (e) => {
                e.preventDefault();
                const pos = getPointerPos(e);
                
                if (!this.graphDragging || !this.graphDragNode) {
                    const node = findNodeAtPos(pos.x, pos.y);
                    canvas.style.cursor = node ? 'grab' : 'default';
                    return;
                }
                
                this.graphDidMove = true;
                canvas.style.cursor = 'grabbing';
                const newX = pos.x - this.graphDragStartX;
                const newY = pos.y - this.graphDragStartY;
                this.graphDragNode.x = newX;
                this.graphDragNode.y = newY;
                
                if (!this.graphNodePositions) this.graphNodePositions = {};
                this.graphNodePositions[this.graphDragNode.path] = { x: newX, y: newY };
                this.drawGraph(ctx, canvas.width, canvas.height);
            };
            
            const handleEnd = () => {
                this.graphDragging = false;
                this.graphDragNode = null;
                canvas.style.cursor = 'default';
            };
            
            canvas.addEventListener('mousedown', handleStart);
            canvas.addEventListener('mousemove', handleMove);
            canvas.addEventListener('mouseup', handleEnd);
            canvas.addEventListener('mouseleave', handleEnd);
            
            canvas.addEventListener('touchstart', handleStart, { passive: false });
            canvas.addEventListener('touchmove', handleMove, { passive: false });
            canvas.addEventListener('touchend', handleEnd);
            
            canvas.addEventListener('click', (e) => {
                if (this.graphDidMove) {
                    this.graphDidMove = false;
                    return;
                }
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                this.handleGraphClick(x, y, ctx, canvas.width, canvas.height);
            });
            
            canvas.addEventListener('touchend', (e) => {
                if (this.graphDidMove && this.graphDragNode) {
                    e.preventDefault();
                }
                this.graphDidMove = false;
            });
        }
        
        redrawGraph() {
            const canvas = document.getElementById('graph-canvas');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            this.drawGraph(ctx, canvas.width, canvas.height);
            this.updateBacklinks();
            this.updateOutgoingLinks();
        }
        
        updateBacklinks() {
            const listEl = document.getElementById('backlinks-list');
            if (!listEl || !this.currentFile) {
                if (listEl) listEl.innerHTML = '<div class="backlinks-empty">No file open</div>';
                return;
            }
            
            const backlinks = [];
            const currentName = this.currentFile.name.replace('.md', '');
            
            this.allFiles.forEach(file => {
                if (file.path === this.currentFile.path) return;
                const content = this.allFilesContent[file.path] || '';
                const matches = content.match(/\[\[([^\]]+)\]\]/g) || [];
                matches.forEach(match => {
                    const linkName = match.replace(/\[\[|\]\]/g, '');
                    if (linkName === currentName) {
                        backlinks.push({ path: file.path, name: file.name.replace('.md', '') });
                    }
                });
            });
            
            if (backlinks.length === 0) {
                listEl.innerHTML = '<div class="backlinks-empty">No backlinks found</div>';
                return;
            }
            
            listEl.innerHTML = backlinks.map(backlink => 
                `<div class="backlink-item" data-path="${backlink.path}" data-name="${backlink.name}">${backlink.name}</div>`
            ).join('');
            
            listEl.querySelectorAll('.backlink-item').forEach(item => {
                item.addEventListener('click', () => {
                    this.loadFile(item.dataset.path, item.dataset.name + '.md');
                });
            });
        }
        
        updateOutgoingLinks() {
            const listEl = document.getElementById('outgoing-list');
            if (!listEl || !this.currentFile) {
                if (listEl) listEl.innerHTML = '<div class="links-empty">No file open</div>';
                return;
            }
            
            const content = this.allFilesContent[this.currentFile.path] || '';
            const matches = content.match(/\[\[([^\]]+)\]\]/g) || [];
            const linkedFiles = [];
            
            matches.forEach(match => {
                const linkName = match.replace(/\[\[|\]\]/g, '');
                const linkedFile = this.allFiles.find(f => f.name.replace('.md', '') === linkName);
                if (linkedFile && linkedFile.path !== this.currentFile.path) {
                    if (!linkedFiles.find(f => f.path === linkedFile.path)) {
                        linkedFiles.push({ path: linkedFile.path, name: linkedFile.name.replace('.md', '') });
                    }
                }
            });
            
            if (linkedFiles.length === 0) {
                listEl.innerHTML = '<div class="links-empty">No outgoing links</div>';
                return;
            }
            
            listEl.innerHTML = linkedFiles.map(link => 
                `<div class="link-item" data-path="${link.path}" data-name="${link.name}">${link.name}</div>`
            ).join('');
            
            listEl.querySelectorAll('.link-item').forEach(item => {
                item.addEventListener('click', () => {
                    this.loadFile(item.dataset.path, item.dataset.name + '.md');
                });
            });
        }
        
drawGraph(ctx, width, height) {
            ctx.clearRect(0, 0, width, height);
            
            const nodes = [];
            const links = [];
            const centerX = width / 2;
            const centerY = height / 2;
            
            const linkedPaths = new Set();
            
            if (this.currentFile) {
                const currentContent = this.allFilesContent[this.currentFile.path] || '';
                const currentLinks = currentContent.match(/\[\[([^\]]+)\]\]/g) || [];
                currentLinks.forEach(match => {
                    const linkName = match.replace(/\[\[|\]\]/g, '');
                    const linkedFile = this.allFiles.find(f => f.name === `${linkName}.md`);
                    if (linkedFile) linkedPaths.add(linkedFile.path);
                });
                
                this.allFiles.forEach(file => {
                    if (file.path === this.currentFile.path) return;
                    const content = this.allFilesContent[file.path] || '';
                    const fileLinks = content.match(/\[\[([^\]]+)\]\]/g) || [];
                    fileLinks.forEach(match => {
                        const linkName = match.replace(/\[\[|\]\]/g, '');
                        if (linkName + '.md' === this.currentFile.name) {
                            linkedPaths.add(file.path);
                        }
                    });
                });
            }
            
            const visiblePaths = new Set([this.currentFile?.path, ...linkedPaths].filter(Boolean));
            const visibleFiles = this.allFiles.filter(f => visiblePaths.has(f.path));
            
            if (visibleFiles.length === 0) {
                this.graphNodes = [];
                return;
            }
            
            const radius = Math.min(width, height) * 0.35;
            
            visibleFiles.forEach((file, index) => {
                const existingPos = this.graphNodePositions?.[file.path];
                const angle = (index / visibleFiles.length) * 2 * Math.PI - Math.PI / 2;
                nodes.push({
                    x: existingPos ? existingPos.x : centerX + radius * Math.cos(angle),
                    y: existingPos ? existingPos.y : centerY + radius * Math.sin(angle),
                    name: file.name.replace('.md', ''),
                    path: file.path,
                    isCurrent: file.path === this.currentFile?.path,
                    isLinked: linkedPaths.has(file.path) && file.path !== this.currentFile?.path
                });
            });
            
            visibleFiles.forEach((file, i) => {
                const content = this.allFilesContent[file.path] || '';
                const matches = content.match(/\[\[([^\]]+)\]\]/g) || [];
                matches.forEach(match => {
                    const linkName = match.replace(/\[\[|\]\]/g, '');
                    const targetFile = this.allFiles.find(f => f.name === `${linkName}.md`);
                    if (targetFile && visiblePaths.has(targetFile.path)) {
                        const targetIndex = visibleFiles.findIndex(f => f.path === targetFile.path);
                        if (targetIndex !== -1 && targetIndex !== i) {
                            links.push({ from: i, to: targetIndex });
                        }
                    }
});
            });
            
            ctx.strokeStyle = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim() || '#444';
            ctx.lineWidth = 1;
            links.forEach(link => {
                ctx.beginPath();
                ctx.moveTo(nodes[link.from].x, nodes[link.from].y);
                ctx.lineTo(nodes[link.to].x, nodes[link.to].y);
                ctx.stroke();
            });
            
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#0df';
            nodes.forEach(node => {
                ctx.beginPath();
                ctx.arc(node.x, node.y, node.isCurrent ? 15 : 10, 0, 2 * Math.PI);
                if (node.isCurrent) {
                    ctx.fillStyle = accentColor;
                } else if (node.isLinked) {
                    ctx.fillStyle = '#40c057';
                } else {
                    ctx.fillStyle = '#888';
                }
                ctx.fill();
                
                ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim() || '#999';
                ctx.textAlign = 'center';
                ctx.fillText(node.name, node.x, node.y + 22);
                
                if (!this.graphNodePositions) this.graphNodePositions = {};
                this.graphNodePositions[node.path] = { x: node.x, y: node.y };
            });
            
            this.graphNodes = nodes;
        }
        
        handleGraphClick(x, y, ctx, width, height) {
            if (!this.graphNodes) return;
            
            this.graphNodes.forEach(node => {
                const dx = x - node.x;
                const dy = y - node.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 20) {
                    this.loadFile(node.path, node.name + '.md');
                }
            });
        }
        
        sanitize(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        window.voltMD = new VoltMDCore({
            jsonUrl: 'core/base.json'
        });
    });
</script>
